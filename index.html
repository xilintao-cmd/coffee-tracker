<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Coffee Journal</title>
  
  <!-- Modern Tech Google Font: Space Grotesk + Noto Sans SC for Chinese -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Standalone & PWA Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CoffeeJournal">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#121214" media="(prefers-color-scheme: dark)">

  <style>
    :root {
      --bg-color: #faf9f6;
      --card-bg: #ffffff;
      --text-primary: #1c1c1e;
      --text-muted: #8e8e93;
      --accent-blue: #00a3e0;
      --accent-blue-hover: #0088bc;
      --accent-blue-light: #f0f9fd;
      --border-color: #e5e5ea;
      --border-subtle: #f0f0f2;
      --danger-color: #d93829;
      --radius-card: 14px;
      --radius-btn: 8px;
      
      /* Space Grotesk + Chinese Font Stack */
      --font-body: 'Space Grotesk', 'Noto Sans SC', -apple-system, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #121214;
        --card-bg: #1c1c1e;
        --text-primary: #f2f2f7;
        --text-muted: #8e8e93;
        --accent-blue: #00a3e0;
        --accent-blue-hover: #33b5e7;
        --accent-blue-light: #102833;
        --border-color: #2c2c2e;
        --border-subtle: #242426;
        --danger-color: #ff453a;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--bg-color);
      color: var(--text-primary);
      line-height: 1.5;
      padding: env(safe-area-inset-top, 24px) 16px env(safe-area-inset-bottom, 24px) 16px;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 4px;
    }

    /* Minimal Header with Blue Heart */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
    }

    header h1 {
      font-family: var(--font-body);
      font-size: 1.45rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-text-nav {
      background: none;
      border: none;
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 6px 10px;
      border-radius: var(--radius-btn);
      cursor: pointer;
      transition: background-color 0.15s ease;
    }

    .btn-text-nav:hover {
      background-color: var(--border-subtle);
    }

    .btn-primary {
      padding: 8px 16px;
      background-color: var(--accent-blue);
      color: #ffffff;
      border: none;
      border-radius: 20px;
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s ease;
    }

    .btn-primary:active {
      opacity: 0.85;
    }

    .btn-secondary {
      padding: 6px 12px;
      background-color: transparent;
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-secondary:hover {
      border-color: var(--text-muted);
    }

    /* Filter & Sort Section */
    .filter-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .search-box {
      width: 100%;
      padding: 11px 16px;
      border: 1px solid var(--border-color);
      border-radius: 20px;
      background-color: var(--card-bg);
      color: var(--text-primary);
      font-size: 0.9rem;
      outline: none;
      font-family: var(--font-body);
    }

    .search-box::placeholder {
      color: var(--text-muted);
    }

    /* Sleek Horizontal Filter Chips Bar */
    .filter-pills-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .filter-chips-group {
      display: flex;
      align-items: center;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .filter-chips-group::-webkit-scrollbar {
      display: none;
    }

    .chip-btn {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 5px 12px;
      border-radius: 16px;
      font-size: 0.76rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s ease;
      font-family: var(--font-body);
    }

    .chip-btn.active {
      background-color: var(--accent-blue);
      color: #ffffff;
      border-color: var(--accent-blue);
    }

    .sort-dropdown-custom {
      position: relative;
      flex-shrink: 0;
    }

    .sort-select-custom {
      appearance: none;
      -webkit-appearance: none;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 5px 22px 5px 10px;
      border-radius: 16px;
      font-size: 0.76rem;
      font-weight: 600;
      font-family: var(--font-body);
      cursor: pointer;
      outline: none;
    }

    .sort-icon-arrow {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.65rem;
      color: var(--text-muted);
      pointer-events: none;
    }

    .coffee-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Clean Unsquished Card Design */
    .coffee-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-card);
      overflow: hidden;
    }

    .coffee-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      user-select: none;
    }

    /* Coffee Bag Thumbnail */
    .coffee-thumb {
      width: 46px;
      height: 46px;
      border-radius: 10px;
      object-fit: cover;
      border: 1px solid var(--border-color);
      background-color: var(--bg-color);
      flex-shrink: 0;
    }

    .coffee-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 0;
    }

    /* Unsquished Multiline Title */
    .coffee-name {
      font-family: var(--font-body);
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.35;
      letter-spacing: 0;
      word-break: break-word;
    }

    .coffee-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .rating-stars {
      color: var(--accent-blue);
      font-weight: 600;
    }

    .roast-badge {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
      border: 1px solid var(--border-color);
      padding: 1px 6px;
      border-radius: 4px;
      background-color: var(--bg-color);
    }

    .expand-icon {
      font-size: 0.8rem;
      color: var(--text-muted);
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }

    .expanded .expand-icon {
      transform: rotate(180deg);
    }

    /* Uncrowded Coffee Body */
    .coffee-body {
      display: none;
      padding: 0 16px 16px 16px;
      flex-direction: column;
      gap: 16px;
    }

    .coffee-card.expanded .coffee-body {
      display: flex;
    }

    /* Target Recipe Box */
    .recipe-box {
      border: 1px solid var(--accent-blue);
      background-color: var(--accent-blue-light);
      color: var(--text-primary);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.84rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 4px;
    }

    .recipe-tag {
      font-weight: 700;
      color: var(--accent-blue);
      text-transform: uppercase;
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      margin-right: 6px;
    }

    .body-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      border-top: 1px solid var(--border-subtle);
    }

    /* Brew Timeline */
    .brew-timeline {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .brew-item {
      padding: 14px 0;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: none;
    }

    .brew-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    /* Ultra-Minimalist Parameter String */
    .brew-stats-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .brew-comments {
      font-size: 0.84rem;
      color: var(--text-muted);
      line-height: 1.45;
      font-weight: 400;
    }

    .brew-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .brew-actions {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--danger-color);
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
    }

    .target-btn {
      background: none;
      border: none;
      color: var(--accent-blue);
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
    }

    .target-btn:hover {
      text-decoration: underline;
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 40px 16px;
      font-size: 0.9rem;
    }

    .input-unit-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-unit-wrapper input {
      padding-right: 28px;
    }

    .input-unit-suffix {
      position: absolute;
      right: 10px;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: bold;
      pointer-events: none;
    }

    /* Image Upload Preview in Modal */
    .photo-upload-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .photo-preview-box {
      width: 54px;
      height: 54px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      object-fit: cover;
      background-color: var(--bg-color);
      flex-shrink: 0;
    }

    /* Clean Modal Styling */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(4px);
      display: none;
      justify-content: center;
      align-items: center;
      padding: 16px;
      z-index: 100;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal-content {
      background-color: var(--card-bg);
      border-radius: var(--radius-card);
      width: 100%;
      max-width: 420px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h2 {
      font-size: 1.15rem;
      font-weight: 700;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--text-muted);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .form-grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    input, textarea, select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-size: 0.9rem;
      outline: none;
      font-family: var(--font-body);
    }

    textarea {
      resize: vertical;
      min-height: 55px;
    }

    .sync-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
      background-color: var(--bg-color);
      padding: 14px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
    }

    .sync-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-primary);
    }
  </style>
</head>
<body>

  <main class="container">
    <header>
      <h1>🩵 Coffee Journal</h1>
      <div class="header-actions">
        <button id="quickSyncBtn" class="btn-text-nav" type="button">Sync</button>
        <button id="openStorageModalBtn" class="btn-text-nav" type="button">Settings</button>
        <button id="openAddCoffeeBtn" class="btn-primary" type="button">+ New</button>
      </div>
    </header>

    <div class="filter-section">
      <input type="text" id="searchInput" class="search-box" placeholder="Search coffees or roasters...">
      
      <!-- Sleek Mobile Filter Pills & Custom Sort Bar -->
      <div class="filter-pills-row">
        <div class="filter-chips-group">
          <button class="chip-btn active" data-rating="all">All</button>
          <button class="chip-btn" data-rating="5">5★</button>
          <button class="chip-btn" data-rating="4">4★+</button>
          <button class="chip-btn" data-rating="3">3★+</button>
          <button class="chip-btn" data-rating="unrated">Unrated</button>
        </div>

        <div class="sort-dropdown-custom">
          <select id="sortSelect" class="sort-select-custom">
            <option value="default">Sort: Default</option>
            <option value="rating_desc">Rating (High → Low)</option>
            <option value="rating_asc">Rating (Low → High)</option>
            <option value="name_asc">Name (A → Z)</option>
            <option value="name_desc">Name (Z → A)</option>
            <option value="brews_desc">Most Brewed</option>
          </select>
          <span class="sort-icon-arrow">▾</span>
        </div>
      </div>
    </div>

    <!-- Accordion List of Coffees -->
    <section id="coffeeList" class="coffee-list"></section>
  </main>

  <!-- MODAL 1: Add New Coffee Bean -->
  <div id="addCoffeeModal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Add Coffee Bean</h2>
        <button class="close-btn" data-close="addCoffeeModal">&times;</button>
      </div>
      <form id="addCoffeeForm">
        <div class="form-group" style="margin-bottom: 10px;">
          <label for="coffeeName">Coffee Name</label>
          <input type="text" id="coffeeName" placeholder="e.g. DAK Peach on the beach" required>
        </div>
        
        <div class="form-grid" style="margin-bottom: 10px;">
          <div class="form-group">
            <label for="coffeeRating">Initial Rating (1-5)</label>
            <input type="number" id="coffeeRating" min="1" max="5" step="0.5" placeholder="e.g. 4.5">
          </div>
          <div class="form-group">
            <label for="coffeeRoast">Roast Level</label>
            <select id="coffeeRoast">
              <option value="Unknown" selected>Unknown</option>
              <option value="Light">Light</option>
              <option value="Light-Medium">Light-Medium</option>
              <option value="Medium">Medium</option>
              <option value="Medium-Dark">Medium-Dark</option>
              <option value="Dark">Dark</option>
            </select>
          </div>
        </div>

        <div class="form-group" style="margin-bottom: 10px;">
          <label>Coffee Bag Photo (Camera / Gallery)</label>
          <div class="photo-upload-container">
            <img id="addPhotoPreview" class="photo-preview-box" alt="Preview">
            <input type="file" id="coffeePhotoInput" accept="image/*" style="font-size: 0.8rem;">
          </div>
        </div>

        <div class="form-group" style="margin-bottom: 14px;">
          <label for="coffeeFinalRecipe">Target Dialed Recipe (Optional)</label>
          <input type="text" id="coffeeFinalRecipe" placeholder="e.g. 5'1, 18g to 36g, 25s, 90°C">
        </div>
        <button type="submit" class="btn-primary" style="width: 100%; justify-content: center;">Save Coffee</button>
      </form>
    </div>
  </div>

  <!-- MODAL 2: Add New Brew Attempt Entry -->
  <div id="addBrewModal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Log Brew Attempt</h2>
        <button class="close-btn" data-close="addBrewModal">&times;</button>
      </div>
      <form id="addBrewForm">
        <input type="hidden" id="targetCoffeeId">
        
        <div class="form-group" style="margin-bottom: 10px;">
          <label>Target Coffee</label>
          <input type="text" id="targetCoffeeNameDisplay" readonly disabled style="opacity: 0.8;">
        </div>

        <div class="form-grid-3" style="margin-bottom: 10px;">
          <div class="form-group">
            <label for="grindSettingSelect">Grind</label>
            <select id="grindSettingSelect" required></select>
          </div>
          <div class="form-group">
            <label for="timeTakenInput">Time</label>
            <div class="input-unit-wrapper">
              <input type="number" id="timeTakenInput" step="1" min="1" max="600" placeholder="25" required>
              <span class="input-unit-suffix">s</span>
            </div>
          </div>
          <div class="form-group">
            <label for="tempInput">Temp</label>
            <div class="input-unit-wrapper">
              <input type="number" id="tempInput" step="1" min="60" max="100" value="90" placeholder="90" required>
              <span class="input-unit-suffix">°C</span>
            </div>
          </div>
        </div>

        <div class="form-grid" style="margin-bottom: 10px;">
          <div class="form-group">
            <label for="doseVal">Dose In (g)</label>
            <input type="number" id="doseVal" step="0.1" value="18" required>
          </div>
          <div class="form-group">
            <label for="yieldVal">Yield Out (g)</label>
            <input type="number" id="yieldVal" step="0.1" value="36" required>
          </div>
        </div>

        <div class="form-group" style="margin-bottom: 14px;">
          <label for="brewComments">Tasting Notes / Comments</label>
          <textarea id="brewComments" placeholder="e.g. Sweeter finish, balanced acidity..."></textarea>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; justify-content: center;">Add Brew Entry</button>
      </form>
    </div>
  </div>

  <!-- MODAL 3: Edit Coffee Details & Rating -->
  <div id="editCoffeeModal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Edit Coffee Details</h2>
        <button class="close-btn" data-close="editCoffeeModal">&times;</button>
      </div>
      <form id="editCoffeeForm">
        <input type="hidden" id="editCoffeeId">
        
        <div class="form-group" style="margin-bottom: 10px;">
          <label for="editCoffeeName">Coffee Name</label>
          <input type="text" id="editCoffeeName" required>
        </div>

        <div class="form-grid" style="margin-bottom: 10px;">
          <div class="form-group">
            <label for="editCoffeeRating">Final Rating (1 to 5)</label>
            <input type="number" id="editCoffeeRating" min="1" max="5" step="0.5" placeholder="e.g. 4.5">
          </div>
          <div class="form-group">
            <label for="editCoffeeRoast">Roast Level</label>
            <select id="editCoffeeRoast">
              <option value="Unknown">Unknown</option>
              <option value="Light">Light</option>
              <option value="Light-Medium">Light-Medium</option>
              <option value="Medium">Medium</option>
              <option value="Medium-Dark">Medium-Dark</option>
              <option value="Dark">Dark</option>
            </select>
          </div>
        </div>

        <div class="form-group" style="margin-bottom: 10px;">
          <label>Coffee Bag Photo (Camera / Gallery)</label>
          <div class="photo-upload-container">
            <img id="editPhotoPreview" class="photo-preview-box" alt="Preview">
            <input type="file" id="editCoffeePhotoInput" accept="image/*" style="font-size: 0.8rem;">
          </div>
        </div>

        <div class="form-group" style="margin-bottom: 14px;">
          <label for="editCoffeeFinalRecipe">Final Target Recipe</label>
          <input type="text" id="editCoffeeFinalRecipe" placeholder="e.g. 5'1, 18g to 36-37g, 25s, 90°C">
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; justify-content: center;">Update Coffee</button>
      </form>
    </div>
  </div>

  <!-- MODAL 4: Unified Storage & Sync Modal -->
  <div id="storageModal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Sync & Storage</h2>
        <button class="close-btn" data-close="storageModal">&times;</button>
      </div>

      <div class="sync-section">
        <div class="sync-title">GitHub Cloud Auto-Sync</div>
        <div style="display: flex; gap: 8px;">
          <button id="pushGithubBtn" class="btn-primary" style="flex: 1; justify-content: center;" type="button">Push to GitHub</button>

      function compressImage(file, maxSide, quality, callback) {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let w = img.width;
            let h = img.height;
            if (w > h) {
              if (w > maxSide) {
                h = Math.round((h * maxSide) / w);
                w = maxSide;
              }
            } else {
              if (h > maxSide) {
                w = Math.round((w * maxSide) / h);
                h = maxSide;
              }
            }
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            callback(canvas.toDataURL('image/jpeg', quality));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);

      const openAddCoffeeBtn = document.getElementById('openAddCoffeeBtn');
      const addCoffeeForm = document.getElementById('addCoffeeForm');
      const addBrewForm = document.getElementById('addBrewForm');
      const editCoffeeForm = document.getElementById('editCoffeeForm');

      const coffeePhotoInput = document.getElementById('coffeePhotoInput');
      const addPhotoPreview = document.getElementById('addPhotoPreview');
      const editCoffeePhotoInput = document.getElementById('editCoffeePhotoInput');
      const editPhotoPreview = document.getElementById('editPhotoPreview');

      function populateGrindOptions() {
        grindSettingSelect.replaceChildren();
        for (let i = 1; i <= 12; i++) {
          const steps = [`${i}`, `${i}'1`, `${i}'2`];
          steps.forEach(step => {
            const opt = document.createElement('option');
            opt.value = step;
            opt.textContent = step;
            if (step === "5'1") opt.selected = true;
            grindSettingSelect.appendChild(opt);
          });
        }
      }

      function loadData() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) {
            const parsed = JSON.parse(raw);
            if (Array.isArray(parsed) && parsed.length > 0) {
              parsed.forEach(c => {
                if (!c.roastLevel) c.roastLevel = "Unknown";
                if (c.photo === undefined) c.photo = null;
              });

              const vertigo = parsed.find(c => c.id === 'c1' || c.name.includes('Vertigo Guatemala Hunapu'));
              if (vertigo && (!vertigo.finalRecipe || vertigo.finalRecipe.trim() === '')) {
                vertigo.finalRecipe = "5'1, 18g to 36-37g";
              }
              saveDataToStorage(parsed);
              return parsed;
            }
          }
        } catch (e) {
          console.error(e);
        }
        saveDataToStorage(DEFAULT_DATASET);
        return DEFAULT_DATASET;
      }

      function saveDataToStorage(data) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        } catch (e) {
          alert('Local storage is full or disabled.');
        }
      }

      function saveData() {
        saveDataToStorage(coffeeData);
      }

      function getGhConfig() {
        try {
          const raw = localStorage.getItem(GH_CONFIG_KEY);
          return raw ? JSON.parse(raw) : null;
        } catch (e) {
          return null;
        }
      }

      function formatRatingStars(num) {
        if (!num) return 'Unrated';
        return `★ ${num}/5`;
      }

      function renderList() {
        coffeeList.replaceChildren();

        const query = searchInput.value.trim().toLowerCase();
        const sortMode = sortSelect.value;

        // 1. Text Search Filter
        let filtered = coffeeData.filter(c => c.name.toLowerCase().includes(query));

        // 2. Rating Filter Pills
        if (activeRatingFilter !== 'all') {
          if (activeRatingFilter === 'unrated') {
            filtered = filtered.filter(c => !c.rating);
          } else {
            const minVal = parseFloat(activeRatingFilter);
            filtered = filtered.filter(c => c.rating && c.rating >= minVal);
          }
        }

        // 3. Sorting
        filtered.sort((a, b) => {
          if (sortMode === 'rating_desc') {
            return (b.rating || 0) - (a.rating || 0);
          } else if (sortMode === 'rating_asc') {
            return (a.rating || 0) - (b.rating || 0);
          } else if (sortMode === 'name_asc') {
            return a.name.localeCompare(b.name, undefined, { sensitivity: 'base' });
          } else if (sortMode === 'name_desc') {
            return b.name.localeCompare(a.name, undefined, { sensitivity: 'base' });
          } else if (sortMode === 'brews_desc') {
            return b.brews.length - a.brews.length;
          }
          return 0; // Default order
        });

        if (filtered.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'empty-state card';
          empty.textContent = query || activeRatingFilter !== 'all'
            ? 'No coffee beans match your search/filter criteria.'
            : 'No entries found. Click "+ New" to add one.';
          coffeeList.appendChild(empty);
          return;
        }

        filtered.forEach(coffee => {
          const card = document.createElement('div');
          card.className = 'coffee-card';
          card.dataset.id = coffee.id;

          // Header
          const header = document.createElement('div');
          header.className = 'coffee-header';

          // Thumbnail (Uploaded Photo or Drawing-Style Placeholder SVG)
          const thumb = document.createElement('img');
          thumb.className = 'coffee-thumb';
          thumb.src = coffee.photo ? coffee.photo : DEFAULT_DRAWING_SVG;
          thumb.alt = coffee.name;

          const infoDiv = document.createElement('div');
          infoDiv.className = 'coffee-info';

          const nameEl = document.createElement('div');
          nameEl.className = 'coffee-name';
          nameEl.textContent = coffee.name;

          const metaDiv = document.createElement('div');
          metaDiv.className = 'coffee-meta';

          const starsSpan = document.createElement('span');
          starsSpan.className = 'rating-stars';
          starsSpan.textContent = formatRatingStars(coffee.rating);

          const badgeSpan = document.createElement('span');
          badgeSpan.textContent = `· ${coffee.brews.length} ${coffee.brews.length === 1 ? 'brew' : 'brews'}`;

          metaDiv.appendChild(starsSpan);
          metaDiv.appendChild(badgeSpan);

          if (coffee.roastLevel && coffee.roastLevel !== 'Unknown') {
            const roastSpan = document.createElement('span');
            roastSpan.className = 'roast-badge';
            roastSpan.textContent = `${coffee.roastLevel} Roast`;
            metaDiv.appendChild(roastSpan);
          }

          infoDiv.appendChild(nameEl);
          infoDiv.appendChild(metaDiv);

          const expandIcon = document.createElement('span');
          expandIcon.className = 'expand-icon';
          expandIcon.textContent = '▼';

          header.appendChild(thumb);
          header.appendChild(infoDiv);
          header.appendChild(expandIcon);

          header.addEventListener('click', () => {
            card.classList.toggle('expanded');
          });

          // Body
          const body = document.createElement('div');
          body.className = 'coffee-body';

          if (coffee.finalRecipe) {
            const recipeBox = document.createElement('div');
            recipeBox.className = 'recipe-box';
            
            const contentDiv = document.createElement('div');
            const tagSpan = document.createElement('span');
            tagSpan.className = 'recipe-tag';
            tagSpan.textContent = 'Target Recipe';
            
            const recipeText = document.createTextNode(coffee.finalRecipe);
            contentDiv.appendChild(tagSpan);
            contentDiv.appendChild(recipeText);
            
            const clearRecipeBtn = document.createElement('button');
            clearRecipeBtn.className = 'delete-btn';
            clearRecipeBtn.textContent = 'Clear';
            clearRecipeBtn.addEventListener('click', (e) => {
              e.stopPropagation();
              if (confirm(`Clear target recipe for "${coffee.name}"?`)) {
                coffee.finalRecipe = '';
                saveData();
                renderList();
              }
            });

            recipeBox.appendChild(contentDiv);
            recipeBox.appendChild(clearRecipeBtn);
            body.appendChild(recipeBox);
          }

          // Controls Bar
          const bodyHeader = document.createElement('div');
          bodyHeader.className = 'body-header';

          const leftActions = document.createElement('div');
          leftActions.style.display = 'flex';
          leftActions.style.gap = '8px';

          const addBrewBtn = document.createElement('button');
          addBrewBtn.className = 'btn-secondary';
          addBrewBtn.type = 'button';
          addBrewBtn.textContent = '+ Log Brew';
          addBrewBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            openLogBrewModal(coffee.id, coffee.name);
          });

          const editCoffeeBtn = document.createElement('button');
          editCoffeeBtn.className = 'btn-secondary';
          editCoffeeBtn.type = 'button';
          editCoffeeBtn.textContent = 'Edit Coffee';
          editCoffeeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            openEditCoffeeModal(coffee);
          });

          leftActions.appendChild(addBrewBtn);
          leftActions.appendChild(editCoffeeBtn);

          const delCoffeeBtn = document.createElement('button');
          delCoffeeBtn.className = 'delete-btn';
          delCoffeeBtn.textContent = 'Delete Coffee';
          delCoffeeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (confirm(`Delete coffee "${coffee.name}" and all logs?`)) {
              coffeeData = coffeeData.filter(c => c.id !== coffee.id);
              saveData();
              renderList();
            }
          });

          bodyHeader.appendChild(leftActions);
          bodyHeader.appendChild(delCoffeeBtn);
          body.appendChild(bodyHeader);

          // Brew Timeline
          const timeline = document.createElement('div');
          timeline.className = 'brew-timeline';

          if (coffee.brews.length === 0) {
            const emptyBrew = document.createElement('div');
            emptyBrew.style.fontSize = '0.85rem';
            emptyBrew.style.color = 'var(--text-muted)';
            emptyBrew.style.padding = '12px 0';
            emptyBrew.textContent = 'No brew logs recorded yet.';
            timeline.appendChild(emptyBrew);
          } else {
            coffee.brews.forEach(brew => {
              const brewEl = document.createElement('div');
              brewEl.className = 'brew-item';

              const statsRow = document.createElement('div');
              statsRow.className = 'brew-stats-row';
              statsRow.textContent = `${brew.grind}  ·  ${brew.dose}g → ${brew.yield}g  ·  ${brew.time}  ·  ${brew.temp || '90°C'}`;

              brewEl.appendChild(statsRow);

              if (brew.comments) {
                const commentEl = document.createElement('div');
                commentEl.className = 'brew-comments';
                commentEl.textContent = brew.comments;
                brewEl.appendChild(commentEl);
              }

              const brewFooter = document.createElement('div');
              brewFooter.className = 'brew-footer';

              const timeSpan = document.createElement('span');
              timeSpan.textContent = brew.timestamp || 'Recorded Log';

              const actionsDiv = document.createElement('div');
              actionsDiv.className = 'brew-actions';

              const targetBtn = document.createElement('button');
              targetBtn.className = 'target-btn';
              targetBtn.textContent = 'Set Target';
              targetBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const recipeStr = `${brew.grind}, ${brew.dose}g to ${brew.yield}g, ${brew.time}, ${brew.temp || '90°C'}${brew.comments ? '. ' + brew.comments : ''}`;
                coffee.finalRecipe = recipeStr;
                saveData();
                renderList();
                const updatedCard = coffeeList.querySelector(`[data-id="${coffee.id}"]`);
                if (updatedCard) updatedCard.classList.add('expanded');
              });

              const delBrewBtn = document.createElement('button');
              delBrewBtn.className = 'delete-btn';
              delBrewBtn.textContent = 'Delete';
              delBrewBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (confirm(`Delete brew entry (${brew.grind}, ${brew.dose}g → ${brew.yield}g)?`)) {
                  coffee.brews = coffee.brews.filter(b => b.id !== brew.id);
                  saveData();
                  renderList();
                  const updatedCard = coffeeList.querySelector(`[data-id="${coffee.id}"]`);
                  if (updatedCard) updatedCard.classList.add('expanded');
                }
              });

              actionsDiv.appendChild(targetBtn);
              actionsDiv.appendChild(delBrewBtn);

              brewFooter.appendChild(timeSpan);
              brewFooter.appendChild(actionsDiv);
              brewEl.appendChild(brewFooter);

              timeline.appendChild(brewEl);
            });
          }

          body.appendChild(timeline);
          card.appendChild(header);
          card.appendChild(body);
          coffeeList.appendChild(card);
        });
      }

      function openModal(el) { el.classList.add('open'); }
      function closeModal(el) { el.classList.remove('open'); }

      document.querySelectorAll('.close-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          closeModal(document.getElementById(btn.dataset.close));
        });
      });

      [addCoffeeModal, addBrewModal, editCoffeeModal, storageModal].forEach(m => {
        m.addEventListener('click', (e) => { if (e.target === m) closeModal(m); });
      });

      // Rating Filter Pill Chips
      chipBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          chipBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeRatingFilter = btn.dataset.rating;
          renderList();
        });
      });

      // Photo Upload Handlers
      coffeePhotoInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        compressImage(file, 400, 0.75, (compressedDataUrl) => {
          tempUploadedPhoto = compressedDataUrl;
          addPhotoPreview.src = tempUploadedPhoto;
        });
      });

      editCoffeePhotoInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        compressImage(file, 400, 0.75, (compressedDataUrl) => {
          tempEditUploadedPhoto = compressedDataUrl;
          editPhotoPreview.src = tempEditUploadedPhoto;
        });
      });

      // Add Coffee Form
      openAddCoffeeBtn.addEventListener('click', () => {
        addCoffeeForm.reset();
        tempUploadedPhoto = null;
        addPhotoPreview.src = DEFAULT_DRAWING_SVG;
        document.getElementById('coffeeRoast').value = 'Unknown';
        openModal(addCoffeeModal);
      });

      addCoffeeForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const nameVal = document.getElementById('coffeeName').value.trim();
        const ratingVal = parseFloat(document.getElementById('coffeeRating').value);
        const roastVal = document.getElementById('coffeeRoast').value;
        const recipeVal = document.getElementById('coffeeFinalRecipe').value.trim();

        if (!nameVal) return;

        const newCoffee = {
          id: 'c_' + Date.now(),
          name: nameVal,
          rating: isNaN(ratingVal) ? null : ratingVal,
          roastLevel: roastVal || 'Unknown',
          photo: tempUploadedPhoto || null,
          finalRecipe: recipeVal,
          brews: []
        };

        coffeeData.unshift(newCoffee);
        saveData();
        closeModal(addCoffeeModal);
        renderList();
      });

      // Edit Coffee Form
      function openEditCoffeeModal(coffee) {
        document.getElementById('editCoffeeId').value = coffee.id;
        document.getElementById('editCoffeeName').value = coffee.name;
        document.getElementById('editCoffeeRating').value = coffee.rating || '';
        document.getElementById('editCoffeeRoast').value = coffee.roastLevel || 'Unknown';
        document.getElementById('editCoffeeFinalRecipe').value = coffee.finalRecipe || '';
        
        tempEditUploadedPhoto = coffee.photo || null;
        editPhotoPreview.src = coffee.photo ? coffee.photo : DEFAULT_DRAWING_SVG;
        editCoffeePhotoInput.value = '';
        
        openModal(editCoffeeModal);
      }

      editCoffeeForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const coffeeId = document.getElementById('editCoffeeId').value;
        const nameVal = document.getElementById('editCoffeeName').value.trim();
        const ratingVal = parseFloat(document.getElementById('editCoffeeRating').value);
        const roastVal = document.getElementById('editCoffeeRoast').value;
        const recipeVal = document.getElementById('editCoffeeFinalRecipe').value.trim();

        const coffee = coffeeData.find(c => c.id === coffeeId);
        if (!coffee) return;

        coffee.name = nameVal || coffee.name;
        coffee.rating = isNaN(ratingVal) ? null : ratingVal;
        coffee.roastLevel = roastVal || 'Unknown';
        coffee.photo = tempEditUploadedPhoto;
        coffee.finalRecipe = recipeVal;

        saveData();
        closeModal(editCoffeeModal);
        renderList();

        const updatedCard = coffeeList.querySelector(`[data-id="${coffee.id}"]`);
        if (updatedCard) updatedCard.classList.add('expanded');
      });

      // Open Add Brew Modal
      function openLogBrewModal(coffeeId, coffeeName) {
        addBrewForm.reset();
        document.getElementById('targetCoffeeId').value = coffeeId;
        document.getElementById('targetCoffeeNameDisplay').value = coffeeName;
        
        document.getElementById('doseVal').value = 18;
        document.getElementById('yieldVal').value = 36;
        document.getElementById('tempInput').value = 90;
        
        openModal(addBrewModal);
      }

      addBrewForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const coffeeId = document.getElementById('targetCoffeeId').value;
        const grind = grindSettingSelect.value;
        const rawTime = document.getElementById('timeTakenInput').value.trim();
        const rawTemp = document.getElementById('tempInput').value.trim();
        const dose = parseFloat(document.getElementById('doseVal').value);
        const yieldOut = parseFloat(document.getElementById('yieldVal').value);
        const comments = document.getElementById('brewComments').value.trim();

        if (isNaN(dose) || isNaN(yieldOut) || dose <= 0 || yieldOut <= 0) {
          alert('Please enter valid numbers for Dose and Yield.');
          return;
        }

        const coffee = coffeeData.find(c => c.id === coffeeId);
        if (!coffee) return;

        let formattedTime = rawTime;
        if (rawTime && !rawTime.endsWith('s')) {
          formattedTime = `${rawTime}s`;
        }

        let formattedTemp = rawTemp ? `${rawTemp}°C` : '90°C';

        const ratio = (yieldOut / dose).toFixed(1);
        const timestamp = new Date().toLocaleString(undefined, {
          month: 'short',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });

        const newBrew = {
          id: 'b_' + Date.now(),
          grind: grind || 'N/A',
          dose: dose,
          yield: yieldOut,
          ratio: ratio,
          time: formattedTime || 'N/A',
          temp: formattedTemp,
          comments: comments,
          timestamp: timestamp
        };

        coffee.brews.unshift(newBrew);
        saveData();
        closeModal(addBrewModal);
        renderList();

        const updatedCard = coffeeList.querySelector(`[data-id="${coffee.id}"]`);
        if (updatedCard) updatedCard.classList.add('expanded');
      });

      // Search & Sort Handlers
      searchInput.addEventListener('input', renderList);
      sortSelect.addEventListener('change', renderList);

      // Export Backup JSON
      exportBtn.addEventListener('click', () => {
        const jsonStr = JSON.stringify(coffeeData, null, 2);
        const blob = new Blob([jsonStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        a.download = `coffee_journal_backup_${new Date().toISOString().slice(0, 10)}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      });

      // Import Backup JSON
      importBtn.addEventListener('click', () => {
        importFileInput.click();
      });

      importFileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        if (!confirm('Importing a backup JSON file will replace your current coffee database. Do you want to proceed?')) {
          importFileInput.value = '';
          return;
        }

        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const imported = JSON.parse(event.target.result);
            if (Array.isArray(imported)) {
              coffeeData = parsed;
              saveData();
              renderList();
              alert('Successfully imported coffee data!');
            } else {
              alert('Invalid backup file format.');
            }
          } catch (err) {
            alert('Error parsing backup file.');
          }
        };
        reader.readAsText(file);
      });

      /**
       * GitHub REST API Auto Sync Integration
       */
      openStorageModalBtn.addEventListener('click', () => {
        const cfg = getGhConfig() || {};
        document.getElementById('ghOwner').value = cfg.owner || 'xilintao-cmd';
        document.getElementById('ghRepo').value = cfg.repo || 'coffee-tracker';
        document.getElementById('ghBranch').value = cfg.branch || 'main';
        document.getElementById('ghToken').value = cfg.token || '';
        openModal(storageModal);
      });

      quickSyncBtn.addEventListener('click', () => {
        const cfg = getGhConfig();
        if (!cfg || !cfg.token || !cfg.owner || !cfg.repo) {
          openStorageModalBtn.click();
        } else {
          pushGithubBtn.click();
        }
      });

      githubForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const cfg = {
          owner: document.getElementById('ghOwner').value.trim(),
          repo: document.getElementById('ghRepo').value.trim(),
          branch: document.getElementById('ghBranch').value.trim(),
          token: document.getElementById('ghToken').value.trim()
        };
        localStorage.setItem(GH_CONFIG_KEY, JSON.stringify(cfg));
        alert('GitHub API Settings Saved!');
      });

      // Push to GitHub API
      pushGithubBtn.addEventListener('click', async () => {
        const cfg = getGhConfig();
        if (!cfg || !cfg.token || !cfg.owner || !cfg.repo) {
          alert('Please enter your Repo Name and GitHub Personal Access Token (PAT) first.');
          openStorageModalBtn.click();
          return;
        }

        const path = 'coffees.json';
        const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}`;
        const contentStr = JSON.stringify(coffeeData, null, 2);
        const base64Content = utf8ToBase64(contentStr);

        try {
          let currentSha = null;
          const getRes = await fetch(`${url}?ref=${cfg.branch}`, {
            headers: { 'Authorization': `Bearer ${cfg.token}` }
          });

          if (getRes.ok) {
            const data = await getRes.json();
            currentSha = data.sha;
          }

          const payload = {
            message: 'Update coffee journal database via Web App',
            content: base64Content,
            branch: cfg.branch
          };
          if (currentSha) payload.sha = currentSha;

          const putRes = await fetch(url, {
            method: 'PUT',
            headers: {
              'Authorization': `Bearer ${cfg.token}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
          });

          if (putRes.ok) {
            alert('✅ Successfully committed and pushed coffees.json to GitHub!');
          } else {
            const errData = await putRes.json();
            alert(`GitHub Push Failed: ${errData.message || putRes.statusText}`);
          }
        } catch (err) {
          alert(`Network error committing to GitHub: ${err.message}`);
        }
      });

      // Pull from GitHub API
      pullGithubBtn.addEventListener('click', async () => {
        const cfg = getGhConfig();
        if (!cfg || !cfg.owner || !cfg.repo) {
          alert('Please configure your GitHub repository details first.');
          openStorageModalBtn.click();
          return;
        }

        if (!confirm('Pulling latest data from GitHub will update your local database. Proceed?')) return;

        const path = 'coffees.json';
        const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}?ref=${cfg.branch}`;
        
        try {
          const headers = {};
          if (cfg.token) headers['Authorization'] = `Bearer ${cfg.token}`;

          const res = await fetch(url, { headers });
          if (!res.ok) {
            alert('Failed to pull coffees.json from GitHub.');
            return;
          }

          const fileData = await res.json();
          const jsonText = base64ToUtf8(fileData.content);
          const parsed = JSON.parse(jsonText);

          if (Array.isArray(parsed)) {
            coffeeData = parsed;
            saveData();
            renderList();
            alert('📥 Successfully pulled and updated coffee journal from GitHub!');
          }
        } catch (err) {
          alert(`Error pulling from GitHub: ${err.message}`);
        }
      });

      // Init
      populateGrindOptions();
      coffeeData = loadData();
      renderList();
    })();
  </script>
</body>
</html>
